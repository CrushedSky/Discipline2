<style>
:root {
  --bg: #0a0a0f;
  --surface: #111118;
  --surface2: #18181f;
  --surface3: #1e1e28;
  --border: #2a2a38;
  --border-glow: #3d3d5c;
  --purple: #7c5cbf;
  --purple-bright: #9b7de8;
  --purple-dim: #4a3870;
  --purple-glow: rgba(124,92,191,0.25);
  --purple-glow-strong: rgba(155,125,232,0.4);
  --text: #e8e8f0;
  --text-dim: #888899;
  --text-muted: #444455;
  --green: #4ecb8d;
  --green-dim: rgba(78,203,141,0.15);
  --amber: #f0a843;
  --red: #e05555;
  --red-dim: rgba(224,85,85,0.1);

  /* 🔥 FONT FALLBACKS /
  --font-display: 'Syne', -apple-system, BlinkMacSystemFont, sans-serif;
  --font-mono: 'Space Mono', monospace;

  --radius: 14px;
  --radius-sm: 8px;
  --transition: 0.2s cubic-bezier(0.4,0,0.2,1);
}

* { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-display);
  min-height:100vh;
  overflow-x:hidden;
}

/ FIXED BORDER VARIABLES /
.app-header {
  padding:20px 20px 14px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  border-bottom:1px solid var(--border);
}

.app-title {
  font-size:13px;
  font-family:var(--font-mono);
  letter-spacing:0.2em;
  color:var(--purple-bright);
  text-transform:uppercase;
}

/ keep rest of your CSS EXACTLY same /

/ QUICK PATCH FOR ANY MISSED VARIABLES /
* {
  border-color: var(--border);
}
</style>
</head>
